services:

  api:
    build: .
    container_name: space_ai_api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}

    restart: always


  streamlit:
    build: .
    container_name: space_ai_ui

    command: streamlit run ui.py --server.port 8501 --server.address 0.0.0.0

    ports:
      - "8501:8501"

    depends_on:
      - api

    volumes:
      - .:/app

    restart: always